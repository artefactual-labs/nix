name: Build

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to build and test.
        required: true
        type: string

jobs:
  image-build:
    name: Build and Smoke Test (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
      - name: Set up buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Derive platform pair
        shell: bash
        run: |
          platform='${{ matrix.platform }}'
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          load: true
          tags: archivematica-toolchain:${{ env.PLATFORM_PAIR }}
      - name: Smoke test image
        shell: bash
        run: |
          ./scripts/smoke-test-docker-image.sh \
            "archivematica-toolchain:${PLATFORM_PAIR}" \
            "${{ matrix.platform }}"
