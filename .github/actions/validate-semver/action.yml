name: Validate Semantic Version
description: Validates a semantic version tag string (e.g., v1.2.3) with a leading "v", using the semver.org regex specification.

# https://semver.org/#is-there-a-suggested-regular-expression-regex-to-check-a-semver-string

inputs:
  version:
    description: Semantic version tag to validate (e.g., v1.2.3 or v1.2.3-rc.1)
    required: true

runs:
  using: composite
  steps:
    - name: Validate semantic version
      shell: python
      env:
        VERSION: ${{ inputs.version }}
      run: |
        import os, re, sys

        version = os.environ.get("VERSION", "").strip()
        pattern = r"^v(?P<major>0|[1-9]\d*)\.(?P<minor>0|[1-9]\d*)\.(?P<patch>0|[1-9]\d*)(?:-(?P<prerelease>(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+(?P<buildmetadata>[0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$"
        if not version or not re.fullmatch(pattern, version):
            print(
                f"Error: '{version}' is not a valid SemVer tag (expected leading 'v').",
                file=sys.stderr,
            )
            sys.exit(1)

        print(f"Valid SemVer tag: {version}")
